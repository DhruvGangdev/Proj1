# .streamlit/secrets.toml
# ─────────────────────────────────────────────────────────────
# INSTRUCTIONS
# ─────────────────────────────────────────────────────────────
# LOCAL DEVELOPMENT:
#   Place this file at .streamlit/secrets.toml in your project root.
#   Never commit this file to GitHub — it is already in .gitignore.
#
# STREAMLIT CLOUD:
#   1. Go to share.streamlit.io → your app → ⋮ → Settings → Secrets
#   2. Paste the key=value pairs below (without the [secrets] header)
#   3. Replace every placeholder value with your real credentials
#   4. Click Save — the app restarts automatically
# ─────────────────────────────────────────────────────────────

# Groq API key — get a free key at https://console.groq.com
GROQ_API_KEY = "gsk_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

# SQL Server connection — your SAP B1 server
DB_SERVER   = "192.168.1.10"          # IP address or hostname (must be publicly reachable from Streamlit Cloud)
DB_PORT     = "1433"                  # default SQL Server port
DB_NAME     = "SBODemoIN"             # your SAP B1 company database name
DB_USER     = "sa"                    # SQL Server login (use a read-only user for safety)
DB_PASSWORD = "YourStrongPassword!"   # SQL Server password

# ODBC driver installed on Streamlit Cloud (do not change unless you know what you're doing)
DB_DRIVER   = "ODBC Driver 18 for SQL Server"
